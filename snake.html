<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Snake Game</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #1a1a2e; display: flex; justify-content: center; align-items: center; height: 100vh; font-family: monospace; }
  #wrap { text-align: center; }
  canvas { background: #16213e; border: 2px solid #0f3460; display: block; margin: 0 auto; }
  #score { color: #e94560; font-size: 24px; margin-bottom: 12px; }
  #msg { color: #eee; font-size: 18px; margin-top: 12px; height: 24px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="score">Score: 0</div>
  <canvas id="c" width="500" height="500"></canvas>
  <div id="msg">Arrow keys or WASD to move</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const scoreEl = document.getElementById('score');
const msgEl = document.getElementById('msg');
const grid = 20, cols = canvas.width / grid, rows = canvas.height / grid;

let snake, dir, nextDir, food, score, running, interval, obstacles;

const sillyFaces = ['>_<', 'xD', ':P', 'o_o', ';)', 'B)', ':3', 'uwu'];

function init() {
  snake = [{x: Math.floor(cols/2), y: Math.floor(rows/2)}];
  dir = {x: 1, y: 0};
  nextDir = {x: 1, y: 0};
  score = 0;
  running = true;
  obstacles = [];
  placeFood();
  scoreEl.textContent = 'Score: 0';
  msgEl.textContent = 'Arrow keys or WASD to move';
  if (interval) clearInterval(interval);
  interval = setInterval(tick, 200);
}

function isCellFree(x, y) {
  return !snake.some(s => s.x === x && s.y === y) &&
         !obstacles.some(o => o.x === x && o.y === y) &&
         !(food && food.x === x && food.y === y);
}

function placeFood() {
  let pos;
  do {
    pos = {x: Math.floor(Math.random()*cols), y: Math.floor(Math.random()*rows)};
  } while (snake.some(s => s.x === pos.x && s.y === pos.y) ||
           obstacles.some(o => o.x === pos.x && o.y === pos.y));
  food = pos;
}

function addObstacle(type) {
  let x, y, attempts = 0;
  const size = type === 'poo' ? 2 : 1;
  do {
    x = Math.floor(Math.random() * (cols - size + 1));
    y = Math.floor(Math.random() * (rows - size + 1));
    attempts++;
    var cellsFree = true;
    for (let dx = 0; dx < size; dx++) {
      for (let dy = 0; dy < size; dy++) {
        if (!isCellFree(x + dx, y + dy) ||
            (Math.abs(x + dx - snake[0].x) < 4 && Math.abs(y + dy - snake[0].y) < 4)) {
          cellsFree = false;
        }
      }
    }
  } while (!cellsFree && attempts < 100);
  if (attempts < 100) {
    const face = sillyFaces[Math.floor(Math.random() * sillyFaces.length)];
    // for 2x2 poo, register all 4 cells; for hedgehog just 1
    for (let dx = 0; dx < size; dx++) {
      for (let dy = 0; dy < size; dy++) {
        obstacles.push({x: x + dx, y: y + dy, type, face, originX: x, originY: y});
      }
    }
  }
}

function tick() {
  if (!running) return;
  dir = {...nextDir};
  const head = {x: snake[0].x + dir.x, y: snake[0].y + dir.y};

  if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows ||
      snake.some(s => s.x === head.x && s.y === head.y) ||
      obstacles.some(o => o.x === head.x && o.y === head.y)) {
    running = false;
    msgEl.textContent = 'Game Over! Press Space to restart';
    clearInterval(interval);
    return;
  }

  snake.unshift(head);
  if (head.x === food.x && head.y === food.y) {
    score++;
    scoreEl.textContent = 'Score: ' + score;
    // add one poo and one hedgehog every 3 points
    if (score % 3 === 0) { addObstacle('poo'); addObstacle('hedgehog'); }
    placeFood();
  } else {
    snake.pop();
  }
  draw();
}

function draw() {
  ctx.clearRect(0, 0, canvas.width, canvas.height);
  // obstacles
  const drawnPoos = new Set();
  obstacles.forEach(o => {
    if (o.type === 'poo') {
      const key = o.originX + ',' + o.originY;
      if (drawnPoos.has(key)) return;
      drawnPoos.add(key);
      // big 2x2 poo
      const cx = o.originX * grid + grid, cy = o.originY * grid + grid;
      ctx.fillStyle = '#8B4513';
      ctx.beginPath();
      ctx.ellipse(cx, cy + 4, grid - 2, grid - 4, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#6B3410';
      ctx.beginPath();
      ctx.ellipse(cx, cy - 4, grid - 6, grid - 6, 0, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#5A2D0C';
      ctx.beginPath();
      ctx.ellipse(cx, cy - 12, grid - 12, grid - 10, 0, 0, Math.PI * 2);
      ctx.fill();
      // poo emoji + silly face
      ctx.font = '18px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\uD83D\uDCA9', cx, cy - 2);
      ctx.fillStyle = '#fff';
      ctx.font = '10px monospace';
      ctx.fillText(o.face, cx, cy + 10);
    } else {
      // hedgehog (1x1)
      const cx = o.x * grid + grid/2, cy = o.y * grid + grid/2;
      // spiky body
      ctx.fillStyle = '#8B6914';
      for (let a = 0; a < 8; a++) {
        const angle = (a / 8) * Math.PI * 2;
        ctx.beginPath();
        ctx.moveTo(cx, cy);
        ctx.lineTo(cx + Math.cos(angle) * 10, cy + Math.sin(angle) * 10);
        ctx.lineTo(cx + Math.cos(angle + 0.3) * 6, cy + Math.sin(angle + 0.3) * 6);
        ctx.fill();
      }
      // body
      ctx.fillStyle = '#D2A679';
      ctx.beginPath();
      ctx.arc(cx, cy, 6, 0, Math.PI * 2);
      ctx.fill();
      // face
      ctx.font = '12px serif';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText('\uD83E\uDD94', cx, cy);
    }
  });
  // food (unicorn poo - rainbow swirl pile)
  const fx = food.x * grid + grid/2, fy = food.y * grid + grid/2;
  const t = Date.now() / 200;
  // bottom blob
  ctx.fillStyle = `hsl(${(t * 30) % 360}, 100%, 65%)`;
  ctx.beginPath();
  ctx.ellipse(fx, fy + 4, 8, 5, 0, 0, Math.PI * 2);
  ctx.fill();
  // middle blob
  ctx.fillStyle = `hsl(${(t * 30 + 90) % 360}, 100%, 65%)`;
  ctx.beginPath();
  ctx.ellipse(fx, fy, 6, 4, 0, 0, Math.PI * 2);
  ctx.fill();
  // top blob
  ctx.fillStyle = `hsl(${(t * 30 + 180) % 360}, 100%, 65%)`;
  ctx.beginPath();
  ctx.ellipse(fx, fy - 4, 4, 3, 0, 0, Math.PI * 2);
  ctx.fill();
  // sparkle
  ctx.fillStyle = '#fff';
  ctx.font = '8px serif';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('\u2728', fx + 6, fy - 6);
  // snake (gold head, neon rainbow body)
  snake.forEach((s, i) => {
    if (i === 0) {
      ctx.fillStyle = '#FFD700';
    } else {
      const hue = (i * 30 + Date.now() / 10) % 360;
      ctx.fillStyle = `hsl(${hue}, 100%, 55%)`;
    }
    ctx.fillRect(s.x * grid + 1, s.y * grid + 1, grid - 2, grid - 2);
  });
}

document.addEventListener('keydown', e => {
  const key = e.key.toLowerCase();
  if ((key === 'arrowup' || key === 'w') && dir.y === 0) nextDir = {x:0, y:-1};
  else if ((key === 'arrowdown' || key === 's') && dir.y === 0) nextDir = {x:0, y:1};
  else if ((key === 'arrowleft' || key === 'a') && dir.x === 0) nextDir = {x:-1, y:0};
  else if ((key === 'arrowright' || key === 'd') && dir.x === 0) nextDir = {x:1, y:0};
  else if (key === ' ' && !running) init();
  e.preventDefault();
});

init();
draw();
</script>
</body>
</html>
