// play a single "string" note - warm, organic tone
function playStringNote(freq, vol) {
  const t = audioCtx.currentTime;
  const dur = 0.18;
  // two slightly detuned oscillators for ensemble warmth
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc1.connect(gain);
  osc2.connect(gain);
  osc3.connect(gain);
  gain.connect(audioCtx.destination);
  // triangle waves sound like muted strings
  osc1.type = 'triangle';
  osc2.type = 'triangle';
  osc3.type = 'sine'; // soft harmonic
  osc1.frequency.setValueAtTime(freq, t);
  osc2.frequency.setValueAtTime(freq * 1.003, t); // slight detune
  osc3.frequency.setValueAtTime(freq * 2, t); // octave harmonic
  // gentle attack and decay like a bowed string
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(vol, t + 0.02);
  gain.gain.linearRampToValueAtTime(vol * 0.7, t + 0.08);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  osc1.start(t);
  osc2.start(t);
  osc3.start(t);
  osc1.stop(t + dur);
  osc2.stop(t + dur);
  osc3.stop(t + dur);
}

function startBgMusic() {
  if (bgMusicInterval) return;
  bgNoteIndex = 0;
  // play notes at ~140 BPM sixteenth notes
  bgMusicInterval = setInterval(() => {
    if (!running && !showIntro) return;
    const freq = vivaldiMelody[bgNoteIndex % vivaldiMelody.length];
    playStringNote(freq, 0.04); // very quiet
    // occasional bass note for depth
    if (bgNoteIndex % 4 === 0) {
      playStringNote(freq * 0.25, 0.025);
    }
    bgNoteIndex++;
  }, 107); // ~140 BPM sixteenths
}

function stopBgMusic() {
  if (bgMusicInterval) {
    clearInterval(bgMusicInterval);
    bgMusicInterval = null;
  }
}

// --- GOOSE HONKS - loud and varied ---

// flying goose honk - loud, nasal, each goose has unique pitch variation
function honk() {
  const t = audioCtx.currentTime;
  // each honk varies in pitch, duration and character
  const baseFreq = 180 + Math.random() * 160;
  const dur = 0.15 + Math.random() * 0.15;
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc1.connect(gain);
  osc2.connect(gain);
  gain.connect(audioCtx.destination);
  // mix of square and sawtooth for nasal raspy honk
  osc1.type = 'square';
  osc2.type = 'sawtooth';
  osc1.frequency.setValueAtTime(baseFreq, t);
  osc1.frequency.linearRampToValueAtTime(baseFreq * (1.2 + Math.random() * 0.3), t + dur * 0.3);
  osc1.frequency.linearRampToValueAtTime(baseFreq * (0.6 + Math.random() * 0.3), t + dur);
  osc2.frequency.setValueAtTime(baseFreq * 1.5, t);
  osc2.frequency.linearRampToValueAtTime(baseFreq * (1.0 + Math.random() * 0.5), t + dur);
  gain.gain.setValueAtTime(0.5 + Math.random() * 0.2, t);
  gain.gain.linearRampToValueAtTime(0.3, t + dur * 0.5);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  osc1.start(t);
  osc2.start(t);
  osc1.stop(t + dur);
  osc2.stop(t + dur);
}

// standing goose honk - VERY LOUD deep foghorn, each one unique
function honkDeep() {
  const t = audioCtx.currentTime;
  const baseFreq = 70 + Math.random() * 60;
  const dur = 0.25 + Math.random() * 0.2;
  const osc1 = audioCtx.createOscillator();
  const osc2 = audioCtx.createOscillator();
  const osc3 = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc1.connect(gain);
  osc2.connect(gain);
  osc3.connect(gain);
  gain.connect(audioCtx.destination);
  osc1.type = 'sawtooth';
  osc2.type = 'square';
  osc3.type = 'triangle';
  // root + detuned fifth + high overtone
  osc1.frequency.setValueAtTime(baseFreq, t);
  osc1.frequency.linearRampToValueAtTime(baseFreq * (0.7 + Math.random() * 0.2), t + dur);
  osc2.frequency.setValueAtTime(baseFreq * (1.48 + Math.random() * 0.04), t);
  osc2.frequency.linearRampToValueAtTime(baseFreq * (1.2 + Math.random() * 0.3), t + dur);
  osc3.frequency.setValueAtTime(baseFreq * (3 + Math.random()), t);
  osc3.frequency.linearRampToValueAtTime(baseFreq * 2, t + dur);
  const vol = 0.55 + Math.random() * 0.25;
  gain.gain.setValueAtTime(vol, t);
  gain.gain.linearRampToValueAtTime(vol * 0.8, t + dur * 0.3);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  osc1.start(t);
  osc2.start(t);
  osc3.start(t);
  osc1.stop(t + dur);
  osc2.stop(t + dur);
  osc3.stop(t + dur);
}

// huge goose honk - EXTREMELY loud, aggressive, distorted roar
function honkHuge() {
  const t = audioCtx.currentTime;
  const baseFreq = 50 + Math.random() * 30; // very low
  const dur = 0.4 + Math.random() * 0.2;
  // 4 oscillators for maximum aggression
  const oscs = [];
  const gain = audioCtx.createGain();
  gain.connect(audioCtx.destination);
  // distorted sawtooth root
  const o1 = audioCtx.createOscillator();
  o1.type = 'sawtooth';
  o1.frequency.setValueAtTime(baseFreq, t);
  o1.frequency.linearRampToValueAtTime(baseFreq * 1.5, t + dur * 0.2);
  o1.frequency.linearRampToValueAtTime(baseFreq * 0.5, t + dur);
  o1.connect(gain);
  oscs.push(o1);
  // aggressive square scream
  const o2 = audioCtx.createOscillator();
  o2.type = 'square';
  o2.frequency.setValueAtTime(baseFreq * 2, t);
  o2.frequency.linearRampToValueAtTime(baseFreq * 3, t + dur * 0.15);
  o2.frequency.linearRampToValueAtTime(baseFreq * 1.5, t + dur);
  o2.connect(gain);
  oscs.push(o2);
  // harsh overtone
  const o3 = audioCtx.createOscillator();
  o3.type = 'sawtooth';
  o3.frequency.setValueAtTime(baseFreq * 5, t);
  o3.frequency.linearRampToValueAtTime(baseFreq * 3, t + dur);
  o3.connect(gain);
  oscs.push(o3);
  // sub bass rumble
  const o4 = audioCtx.createOscillator();
  o4.type = 'triangle';
  o4.frequency.setValueAtTime(baseFreq * 0.5, t);
  o4.connect(gain);
  oscs.push(o4);
  // LOUD with aggressive attack
  gain.gain.setValueAtTime(0, t);
  gain.gain.linearRampToValueAtTime(0.8, t + 0.01);
  gain.gain.setValueAtTime(0.75, t + dur * 0.3);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  oscs.forEach(o => { o.start(t); o.stop(t + dur); });
}

  osc3.start(t);
  osc1.stop(t + dur);
  osc2.stop(t + dur);
  osc3.stop(t + dur);
}

// MASSIVE death honk - all the geese honk at once
function deathHonk() {
  const t = audioCtx.currentTime;
  const dur = 1.2;
  [55, 73, 98, 130, 165, 220].forEach((freq, i) => {
    const osc = audioCtx.createOscillator();
    const gain = audioCtx.createGain();
    osc.connect(gain);
    gain.connect(audioCtx.destination);
    osc.type = i % 2 === 0 ? 'sawtooth' : 'square';
    osc.frequency.setValueAtTime(freq, t);
    osc.frequency.linearRampToValueAtTime(freq * 1.3, t + 0.1);
    osc.frequency.linearRampToValueAtTime(freq * 0.4, t + dur);
    gain.gain.setValueAtTime(0, t);
    gain.gain.linearRampToValueAtTime(0.9, t + 0.03);
    gain.gain.setValueAtTime(0.8, t + 0.3);
    gain.gain.linearRampToValueAtTime(0, t + dur);
    osc.start(t);
    osc.stop(t + dur);
  });
  // high screaming overtone
  const osc = audioCtx.createOscillator();
  const gain = audioCtx.createGain();
  osc.connect(gain);
  gain.connect(audioCtx.destination);
  osc.type = 'square';
  osc.frequency.setValueAtTime(440, t);
  osc.frequency.linearRampToValueAtTime(880, t + 0.15);
  osc.frequency.linearRampToValueAtTime(110, t + dur);
  gain.gain.setValueAtTime(0.7, t);
  gain.gain.linearRampToValueAtTime(0, t + dur);
  osc.start(t);
  osc.stop(t + dur);
}

function init() {
  dino = { x: 60, y: GROUND, w: 30, h: STAND_HEIGHT, vy: 0, ducking: false, grounded: true };
  obstacles = [];
  clouds = [];
  score = 0;
  speed = 5;
  running = false;
  gameOver = false;
  frame = 0;
  lastObstacle = 0;
  scoreEl.textContent = 'Score: 0';
  msgEl.textContent = 'Press Space or Up to start';
  draw();
}

function spawnObstacle() {
  const type = Math.random();
  if (type < 0.5) {
    // standing geese (50%)
    const sub = Math.random();
    const taunt = geeseMeanPhrases[Math.floor(Math.random() * geeseMeanPhrases.length)];
    if (sub < 0.4) {
      obstacles.push({ x: W, y: GROUND, w: 18, h: 35, type: 'cactus-s', honkTimer: 0, points: 1, taunt });
    } else if (sub < 0.75) {
      obstacles.push({ x: W, y: GROUND, w: 22, h: 50, type: 'cactus-t', honkTimer: 0, points: 3, taunt });
      honkHuge();
    } else {
      obstacles.push({ x: W, y: GROUND, w: 40, h: 35, type: 'cactus-d', honkTimer: 0, points: 2, taunt });
    }
  } else {
    // flying goose (50%)
    const taunt = geeseMeanPhrases[Math.floor(Math.random() * geeseMeanPhrases.length)];
    const birdY = GROUND - [0, 30, 55][Math.floor(Math.random() * 3)];
    obstacles.push({ x: W, y: birdY, w: 30, h: 20, type: 'bird', wingFrame: 0, honkTimer: 0, points: 1, taunt });
  }
}

function update() {
  frame++;
  speed = 5 + Math.floor(score / 10) * 0.8;
  scoreEl.textContent = 'Score: ' + score;

  // dino physics
  if (!dino.grounded) {
    dino.vy += GRAVITY;
    dino.y += dino.vy;
    if (dino.y >= GROUND) {
      dino.y = GROUND;
      dino.vy = 0;
      dino.grounded = true;
    }
  }
  dino.h = dino.ducking && dino.grounded ? DUCK_HEIGHT : STAND_HEIGHT;

  // spawn obstacles
  lastObstacle++;
  const minGap = Math.max(50, 90 - speed * 3);
  if (lastObstacle > minGap && Math.random() < 0.03) {
    spawnObstacle();
    lastObstacle = 0;
  }

  // move obstacles (geese chase the duck!)
  obstacles.forEach(o => {
    o.x -= speed;
    // standing geese creep toward the duck (silent until dodged)
    if (o.type !== 'bird') {
      if (o.x > dino.x) o.x -= 0.5;
    } else {
      // flying geese chase horizontally and vertically
      o.wingFrame = Math.floor(frame / 8) % 2;
      if (o.x > dino.x) o.x -= 0.8;
      const targetY = dino.y - dino.h / 2;
      if (o.y < targetY) o.y += 0.4;
      else if (o.y > targetY) o.y -= 0.4;
    }
  });
  obstacles.forEach(o => {
    if (!o.passed && o.x + o.w < dino.x) {
      o.passed = true;
      score += o.points || 1;
      // angry honk when dodged
      if (o.type === 'cactus-d') honkDouble();
      else if (o.type === 'cactus-t') honkHuge();
      else if (o.type === 'bird') honk();
      else honkDeep();
      scoreEl.textContent = 'Score: ' + score;
    }
  });
  obstacles = obstacles.filter(o => o.x + o.w > -20);

  // spawn clouds
  if (Math.random() < 0.005) {
    clouds.push({ x: W, y: 30 + Math.random() * 50, w: 40 + Math.random() * 30 });
  }
  clouds.forEach(c => c.x -= speed * 0.3);
  clouds = clouds.filter(c => c.x + c.w > 0);

  // collision
  const dx = dino.x, dy = dino.y - dino.h, dw = dino.w, dh = dino.h;
  const margin = 5;
  for (const o of obstacles) {
    const ox = o.x, oy = o.y - o.h, ow = o.w, oh = o.h;
    if (dx + margin < ox + ow && dx + dw - margin > ox &&
        dy + margin < oy + oh && dy + dh - margin > oy) {
      running = false;
      gameOver = true;
      stopBgMusic();
      deathHonk();
      deathInsult = deathInsults[Math.floor(Math.random() * deathInsults.length)];
      deathGooseTaunt = geeseMeanPhrases[Math.floor(Math.random() * geeseMeanPhrases.length)];
      if (score > highScore) highScore = score;
      scoreEl.textContent = 'Score: ' + score + '  |  Best: ' + highScore;
      msgEl.textContent = 'YOU GOT HONKED! Press Space to restart';
      return;
    }
  }
}

function drawCactus(o) {
  // standing silly goose
  const x = o.x, y = o.y;
  const scale = o.type === 'cactus-t' ? 1.3 : (o.type === 'cactus-d' ? 1 : 0.9);
  const h = o.h * scale / (o.type === 'cactus-d' ? 1 : 1);

  if (o.type === 'cactus-d') {
    // two geese side by side
    drawStandingGoose(x, y, 0.85);
    drawStandingGoose(x + 22, y, 0.85);
  } else {
    drawStandingGoose(x, y, scale);
  }
}

function drawStandingGoose(x, y, scale) {
  const s = scale;
  const w = 28 * s; // approximate width of goose
  // flip horizontally: save, translate to right edge, scale -1
  ctx.save();
  ctx.translate(x + w, 0);
  ctx.scale(-1, 1);
  const lx = 0; // draw at local x=0
  // legs
  ctx.strokeStyle = '#E8A000';
  ctx.lineWidth = 2.5 * s;
  ctx.beginPath();
  ctx.moveTo(lx + 8 * s, y); ctx.lineTo(lx + 6 * s, y - 14 * s);
  ctx.moveTo(lx + 14 * s, y); ctx.lineTo(lx + 16 * s, y - 14 * s);
  ctx.stroke();
  // feet
  ctx.fillStyle = '#E8A000';
  ctx.beginPath();
  ctx.moveTo(lx + 8 * s, y); ctx.lineTo(lx + 2 * s, y + 2); ctx.lineTo(lx + 12 * s, y + 2);
  ctx.fill();
  ctx.beginPath();
  ctx.moveTo(lx + 14 * s, y); ctx.lineTo(lx + 9 * s, y + 2); ctx.lineTo(lx + 19 * s, y + 2);
  ctx.fill();
  // body
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.ellipse(lx + 11 * s, y - 22 * s, 12 * s, 10 * s, 0, 0, Math.PI * 2);

  ctx.strokeStyle = '#ccc';
  ctx.lineWidth = 1;
  ctx.stroke();
  // neck
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.moveTo(lx + 16 * s, y - 28 * s);
  ctx.quadraticCurveTo(lx + 20 * s, y - 50 * s, lx + 14 * s, y - 55 * s);
  ctx.quadraticCurveTo(lx + 8 * s, y - 50 * s, lx + 10 * s, y - 28 * s);
  ctx.fill();
  ctx.strokeStyle = '#ccc';
  ctx.stroke();
  // head
  ctx.fillStyle = '#f0f0f0';
  ctx.beginPath();
  ctx.arc(lx + 13 * s, y - 56 * s, 7 * s, 0, Math.PI * 2);
  ctx.fill();
  ctx.strokeStyle = '#ccc';
  ctx.stroke();
  // angry eye
  ctx.fillStyle = '#000';
  ctx.beginPath();
  ctx.arc(lx + 16 * s, y - 58 * s, 2 * s, 0, Math.PI * 2);
  ctx.fill();
  // angry eyebrow

  ctx.lineWidth = 1.5 * s;
  ctx.beginPath();
  ctx.moveTo(lx + 13 * s, y - 61 * s);

  ctx.lineTo(lx + 28 * s, y - 58 * s);
  ctx.lineTo(lx + 19 * s, y - 55 * s);

  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';

function drawPsychedelicBg() {
  const t = Date.now() / 1000;
  // swirling gradient background
  for (let y = 0; y < H; y += 8) {
    const hue = (y * 1.5 + t * 60 + Math.sin(y * 0.02 + t * 2) * 40) % 360;
    const light = 30 + Math.sin(y * 0.05 + t * 3) * 15;
    ctx.fillStyle = `hsl(${hue}, 80%, ${light}%)`;
    ctx.fillRect(0, y, W, 8);
  }
  // pulsing circles
  for (let i = 0; i < 5; i++) {
    const cx = W * 0.5 + Math.sin(t * 0.7 + i * 1.3) * W * 0.4;
    const cy = H * 0.4 + Math.cos(t * 0.5 + i * 0.9) * H * 0.3;
    const r = 30 + Math.sin(t * 2 + i) * 20;
    const hue = (t * 80 + i * 72) % 360;
    ctx.globalAlpha = 0.15;
    ctx.fillStyle = `hsl(${hue}, 100%, 60%)`;
    ctx.beginPath();
    ctx.arc(cx, cy, r, 0, Math.PI * 2);
    ctx.fill();
    ctx.globalAlpha = 1;
  }
  // spiral waves
  ctx.lineWidth = 2;
  for (let s = 0; s < 3; s++) {
    ctx.strokeStyle = `hsl(${(t * 100 + s * 120) % 360}, 100%, 60%)`;
    ctx.globalAlpha = 0.25;
    ctx.beginPath();
    for (let x = 0; x < W; x += 4) {
      const wave = Math.sin(x * 0.015 + t * 3 + s * 2) * 30 +
                   Math.sin(x * 0.03 + t * 1.5 + s) * 15;
      const py = H * 0.3 + wave + s * 40;
      if (x === 0) ctx.moveTo(x, py);
      else ctx.lineTo(x, py);
    }
    ctx.stroke();
    ctx.globalAlpha = 1;
  }
}

function draw() {
  ctx.clearRect(0, 0, W, H);

  // psychedelic background
  drawPsychedelicBg();

  // clouds (semi-transparent)
  ctx.globalAlpha = 0.6;
  ctx.fillStyle = '#fff';
  clouds.forEach(c => {
    ctx.beginPath();
    ctx.ellipse(c.x + c.w / 2, c.y, c.w / 2, 8, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.beginPath();
    ctx.ellipse(c.x + c.w * 0.3, c.y - 4, c.w * 0.3, 6, 0, 0, Math.PI * 2);
    ctx.fill();
  });
  ctx.globalAlpha = 1;

  // ground
  ctx.strokeStyle = '#fff';
  ctx.lineWidth = 2;
  ctx.beginPath();
  ctx.moveTo(0, GROUND);
  ctx.lineTo(W, GROUND);
  ctx.stroke();
  // ground texture
  const gOffset = (frame * speed) % 20;
  for (let gx = -gOffset; gx < W; gx += 20) {
    const len = 3 + Math.abs(((gx * 7) % 11) - 5);
    ctx.beginPath();
    ctx.moveTo(gx, GROUND + 8);
    ctx.lineTo(gx + len, GROUND + 8);
    ctx.stroke();
  }

  // obstacles and their speech bubbles
  obstacles.forEach(o => {
    if (o.type === 'bird') drawBird(o);
    else drawCactus(o);
    // goose taunt bubble
    if (o.taunt && o.x > -20 && o.x < W) {
      const bx = o.type === 'bird' ? o.x + 10 : o.x;
      const by = o.type === 'bird' ? o.y - 35 : o.y - (o.type === 'cactus-t' ? 85 : 60);
      ctx.font = 'bold 13px monospace';
      const tw = ctx.measureText(o.taunt).width;
      const bw = Math.max(22, tw / 2 + 10);
      // solid white rounded rect bubble with dark border
      const rx = bx + bw - bw, ry = by - 20, rw = bw * 2 + 8, rh = 24, rad = 8;
      ctx.fillStyle = '#fff';
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(rx + rad, ry);
      ctx.lineTo(rx + rw - rad, ry);
      ctx.quadraticCurveTo(rx + rw, ry, rx + rw, ry + rad);
      ctx.lineTo(rx + rw, ry + rh - rad);
      ctx.quadraticCurveTo(rx + rw, ry + rh, rx + rw - rad, ry + rh);
      ctx.lineTo(rx + rad, ry + rh);
      ctx.quadraticCurveTo(rx, ry + rh, rx, ry + rh - rad);
      ctx.lineTo(rx, ry + rad);
      ctx.quadraticCurveTo(rx, ry, rx + rad, ry);
      ctx.closePath();
      ctx.fill();
      ctx.stroke();
      // tail pointing down to goose
      ctx.fillStyle = '#fff';
      ctx.beginPath();
      ctx.moveTo(bx + bw - 5, by + 4);
      ctx.lineTo(bx + bw, by + 12);
      ctx.lineTo(bx + bw + 5, by + 4);
      ctx.fill();
      ctx.strokeStyle = '#333';
      ctx.lineWidth = 2;
      ctx.beginPath();
      ctx.moveTo(bx + bw - 5, by + 4);
      ctx.lineTo(bx + bw, by + 12);
      ctx.lineTo(bx + bw + 5, by + 4);
      ctx.stroke();
      // cover tail join with white
      ctx.fillStyle = '#fff';
      ctx.fillRect(bx + bw - 6, by + 2, 12, 4);
      // text - dark red, big and bold
      ctx.fillStyle = '#aa0000';
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(o.taunt, bx + bw, by - 8);
    }
  });

  // dino
  drawDino();

  // speech bubble - only changes when dodging a goose (below or above one)
  if (running) {
    const closestGoose = obstacles.find(o => {
      const dist = Math.abs(o.x - dino.x);
      return dist < 60 && o.x > dino.x - 20;
    });
    const nearGoose = !!closestGoose;
    if (nearGoose && !dino._wasNearGoose) {
      if (closestGoose.taunt && snorkackResponses[closestGoose.taunt]) {
        const options = snorkackResponses[closestGoose.taunt];
        let pick;
        // prevent same taunt+response combo twice in a row
        do {
          pick = options[Math.floor(Math.random() * options.length)];
        } while (pick === lastResponse && closestGoose.taunt === lastTaunt && options.length > 1);
        lastTaunt = closestGoose.taunt;
        lastResponse = pick;
        currentPhrase = pick;
      } else {
        currentPhrase = snorkackFallback[Math.floor(Math.random() * snorkackFallback.length)];
      }
    }
    dino._wasNearGoose = nearGoose;
    const bx = dino.x + 30, by = dino.y - (dino.ducking && dino.grounded ? 30 : 65);
    ctx.font = 'bold 11px monospace';
    const tw = ctx.measureText(currentPhrase).width;
    const bw = Math.max(22, tw / 2 + 8);
    // bubble
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(bx + bw, by - 8, bw + 4, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#7B20CF';
    ctx.lineWidth = 1.5;
    ctx.stroke();
    // tail pointing to snorkack
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.moveTo(bx + 4, by);
    ctx.lineTo(bx - 2, by + 8);
    ctx.lineTo(bx + 10, by + 2);
    ctx.fill();
    ctx.strokeStyle = '#7B20CF';
    ctx.beginPath();
    ctx.moveTo(bx + 4, by);
    ctx.lineTo(bx - 2, by + 8);
    ctx.lineTo(bx + 10, by + 2);
    ctx.stroke();
    // text
    ctx.fillStyle = '#9B30FF';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(currentPhrase, bx + bw, by - 8);
  }

  // game over overlay
  if (gameOver) {
    // translucent red background
    ctx.fillStyle = 'rgba(150, 0, 0, 0.7)';
    ctx.fillRect(0, 0, W, H);
    // huge red text with black outline
    ctx.font = 'bold 52px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    // black outline
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 5;
    ctx.strokeText('YOU GOT HONKED', W / 2, H / 2 - 25);
    // red fill
    ctx.fillStyle = '#ff2222';
    ctx.fillText('YOU GOT HONKED', W / 2, H / 2 - 25);
    // score below
    ctx.font = 'bold 22px monospace';
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 3;
    ctx.strokeText('Score: ' + score + '  |  Best: ' + highScore, W / 2, H / 2 + 25);
    ctx.fillStyle = '#fff';
    ctx.fillText('Score: ' + score + '  |  Best: ' + highScore, W / 2, H / 2 + 20);
    // funny insult
    ctx.font = 'italic 16px monospace';
    ctx.fillStyle = '#ffaaaa';
    ctx.fillText(deathInsult, W / 2, H / 2 + 50);
    // taunting goose
    const gx = W * 0.2, gy = H / 2 + 85;
    // body
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.ellipse(gx, gy, 16, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#ccc';
    ctx.lineWidth = 1;
    ctx.stroke();
    // neck
    ctx.fillStyle = '#f0f0f0';
    ctx.beginPath();
    ctx.moveTo(gx + 10, gy - 8);
    ctx.quadraticCurveTo(gx + 16, gy - 24, gx + 10, gy - 30);
    ctx.quadraticCurveTo(gx + 4, gy - 24, gx + 4, gy - 8);
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.arc(gx + 8, gy - 32, 8, 0, Math.PI * 2);
    ctx.fill();
    // smug eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(gx + 12, gy - 34, 2, 0, Math.PI * 2);
    ctx.fill();
    // smug eyebrow (raised)
    ctx.strokeStyle = '#000';
    ctx.lineWidth = 1.5;
    ctx.beginPath();
    ctx.moveTo(gx + 9, gy - 38);
    ctx.lineTo(gx + 15, gy - 37);
    ctx.stroke();
    // open beak (laughing)
    ctx.fillStyle = '#E8A000';
    ctx.beginPath();
    ctx.moveTo(gx + 15, gy - 33);
    ctx.lineTo(gx + 26, gy - 34);
    ctx.lineTo(gx + 15, gy - 30);
    ctx.fill();
    ctx.beginPath();
    ctx.moveTo(gx + 15, gy - 29);
    ctx.lineTo(gx + 24, gy - 26);
    ctx.lineTo(gx + 15, gy - 26);
    ctx.fill();
    // taunt bubble from goose
    const deathTaunt = deathGooseTaunt;
    ctx.font = 'bold 12px monospace';
    const dtw = ctx.measureText(deathTaunt).width;
    const dbw = Math.max(20, dtw / 2 + 10);
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.ellipse(gx + 8 + dbw + 15, gy - 50, dbw + 4, 12, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.strokeStyle = '#333';
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = '#cc0000';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText(deathTaunt, gx + 8 + dbw + 15, gy - 50);
  }
}

function drawIntro() {
  const t = Date.now() / 1000;
  // psychedelic bg
  drawPsychedelicBg();

  // dark overlay for readability
  ctx.fillStyle = 'rgba(0, 0, 0, 0.6)';
  ctx.fillRect(0, 0, W, H);

  const page = introPages[introPage];

  // title on first page
  if (introPage === 0) {
    ctx.fillStyle = '#FFD700';
    ctx.font = 'bold 22px monospace';
    ctx.textAlign = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('THE CRUMPLE-HORNED SNORKACK: HONK FURY', W / 2, 28);
  }

  // story text
  ctx.fillStyle = '#fff';
  ctx.font = '14px monospace';
  ctx.textAlign = 'center';
  const startY = introPage === 0 ? 65 : 50;
  page.text.forEach((line, i) => {
    // quoted lines in different color
    if (line.startsWith('"')) ctx.fillStyle = '#ff6666';
    else if (line.startsWith('TO HONK')) ctx.fillStyle = '#ff4444';
    else ctx.fillStyle = '#fff';
    ctx.fillText(line, W / 2, startY + i * 22);
  });

  // draw the snorkack on the last page BEFORE subtitle so horns go behind text
  if (introPage === 3) {
    const px = W / 2;
    // big pink curly crumple-horns first (behind everything)
    ctx.strokeStyle = '#FF69B4';
    ctx.lineWidth = 3;
    ctx.lineCap = 'round';
    ctx.beginPath();
    ctx.moveTo(px + 1, H - 126);
    ctx.bezierCurveTo(px - 10, H - 134, px - 12, H - 144, px - 6, H - 150);
    ctx.bezierCurveTo(px, H - 154, px + 6, H - 148, px + 2, H - 142);
    ctx.bezierCurveTo(px - 2, H - 136, px - 8, H - 140, px - 4, H - 146);
    ctx.stroke();
    ctx.beginPath();
    ctx.moveTo(px + 11, H - 126);
    ctx.bezierCurveTo(px + 22, H - 134, px + 24, H - 144, px + 18, H - 150);
    ctx.bezierCurveTo(px + 12, H - 154, px + 6, H - 148, px + 10, H - 142);
    ctx.bezierCurveTo(px + 14, H - 136, px + 20, H - 140, px + 16, H - 146);
    ctx.stroke();
    // body
    ctx.fillStyle = '#9B30FF';
    ctx.beginPath();
    ctx.ellipse(px, H - 90, 12, 13, 0.15, 0, Math.PI * 2);
    ctx.fill();
    // wing
    ctx.fillStyle = '#B060FF';
    ctx.beginPath();
    ctx.ellipse(px - 5, H - 92, 8, 8, -0.4, 0, Math.PI * 2);
    ctx.fill();
    // neck (wonky)
    ctx.fillStyle = '#9B30FF';
    ctx.beginPath();
    ctx.moveTo(px + 6, H - 100);
    ctx.quadraticCurveTo(px + 12, H - 114, px + 7, H - 118);
    ctx.quadraticCurveTo(px + 1, H - 114, px + 2, H - 100);
    ctx.fill();
    // head
    ctx.beginPath();
    ctx.arc(px + 6, H - 120, 8, 0, Math.PI * 2);
    ctx.fill();
    // beak
    ctx.fillStyle = '#CC77FF';
    ctx.beginPath();
    ctx.moveTo(px + 13, H - 121);
    ctx.lineTo(px + 22, H - 119);
    ctx.lineTo(px + 13, H - 117);
    ctx.fill();
    // determined eye
    ctx.fillStyle = '#000';
    ctx.beginPath();
    ctx.arc(px + 10, H - 122, 2.5, 0, Math.PI * 2);
    ctx.fill();
    ctx.fillStyle = '#fff';
    ctx.beginPath();
    ctx.arc(px + 11, H - 123, 1, 0, Math.PI * 2);
    ctx.fill();
  }

  // subtitle (drawn on top of sprite)
  ctx.fillStyle = '#66ffff';
  ctx.font = 'bold 16px monospace';
  ctx.fillText(page.sub, W / 2, H - 50);

  // draw angry geese on pages 1-2
  if (introPage === 1 || introPage === 2) {
    const gx = [W * 0.2, W * 0.5, W * 0.8];
    gx.forEach((x, i) => {
      const bob = Math.sin(t * 3 + i) * 3;
      ctx.fillStyle = '#f0f0f0';
      ctx.beginPath();
      ctx.arc(x, H - 80 + bob, 12, 0, Math.PI * 2);
      ctx.fill();
      ctx.fillStyle = '#E8A000';
      ctx.beginPath();
      ctx.moveTo(x - 10, H - 80 + bob);
      ctx.lineTo(x - 18, H - 82 + bob);
      ctx.lineTo(x - 10, H - 76 + bob);
      ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath();
      ctx.arc(x - 4, H - 83 + bob, 2, 0, Math.PI * 2);
      ctx.fill();
      // angry eyebrow
      ctx.strokeStyle = '#000';
      ctx.lineWidth = 1.5;
      ctx.beginPath();
      ctx.moveTo(x - 7, H - 87 + bob);
      ctx.lineTo(x - 1, H - 86 + bob);
      ctx.stroke();
    });
  }

  // page indicator
  ctx.fillStyle = '#666';
  ctx.font = '12px monospace';
  ctx.fillText((introPage + 1) + ' / ' + introPages.length + '  [SPACE]', W / 2, H - 15);
}

function gameLoop() {
  if (showIntro) {
    drawIntro();
  } else if (running) {
    update();
    draw();
  }
  requestAnimationFrame(gameLoop);
}

document.addEventListener('keydown', e => {
  const key = e.key;
  if ((key === ' ' || key === 'ArrowUp') && showIntro) {
    introPage++;
    if (introPage >= introPages.length) {
      showIntro = false;
      init();
      running = true;
      startBgMusic();
      msgEl.textContent = '';
      scoreEl.textContent = 'Score: 0';
    }
    e.preventDefault();
    return;
  }
  if ((key === ' ' || key === 'ArrowUp') && gameOver) {
    init();
    running = true;
    startBgMusic();
    msgEl.textContent = '';
    e.preventDefault();
    return;
  }
  if ((key === ' ' || key === 'ArrowUp') && !running && !gameOver) {
    running = true;
    msgEl.textContent = '';
  }
  if ((key === ' ' || key === 'ArrowUp') && dino.grounded && running) {
    dino.vy = JUMP_FORCE;
    dino.grounded = false;
    dino.ducking = false;
    snorkackJump();
    e.preventDefault();
  }
  if (key === 'ArrowDown' && running && !dino.ducking) {
    dino.ducking = true;
    snorkackDuck();
    if (!dino.grounded) dino.vy += 4; // fast fall
    e.preventDefault();
  }
});

document.addEventListener('keyup', e => {
  if (e.key === 'ArrowDown') dino.ducking = false;
});

scoreEl.textContent = '';
msgEl.textContent = '';
init();
gameLoop();
</script>
</body>
</html>
